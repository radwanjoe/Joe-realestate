<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل العقار - شركة ود العقارية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: #f4f7f6; color: #333; }
        
        .nav-bar { background-color: #1a252f; padding: 15px 20px; text-align: right; }
        .back-btn { background: rgba(255, 255, 255, 0.1); color: #fff; text-decoration: none; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 8px; font-weight: 600; }
        .back-btn:hover { background: #1abc9c; }

        .main-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        
        .section-box { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .section-title { font-size: 1.2rem; color: #2c3e50; margin-bottom: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .section-title i { color: #1abc9c; }

        .video-box { width: 100%; border-radius: 8px; overflow: hidden; background: #000; position: relative; padding-top: 56.25%; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .gallery-main { width: 100%; height: 400px; border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
        .gallery-main img { width: 100%; height: 100%; object-fit: cover; }
        
        .thumbnails-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .thumb { width: 100%; height: 80px; border-radius: 6px; object-fit: cover; cursor: pointer; opacity: 0.6; transition: opacity 0.2s; }
        .thumb.active, .thumb:hover { opacity: 1; border: 2px solid #1abc9c; }

        .map-box { width: 100%; height: 350px; border-radius: 8px; overflow: hidden; }

        footer { background-color: #1a252f; color: white; text-align: center; padding: 25px 10px; margin-top: 40px; }
        footer p { font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="main-container" style="margin:0 auto; padding:0;">
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-right"></i> العودة للرئيسية</a>
        </div>
    </div>

    <div class="main-container">
        
        <div style="margin-bottom: 30px;">
            <h1 style="color: #2c3e50; font-size: 1.8rem; font-weight: 700; margin-bottom: 5px;">تفاصيل ومعاينة الشقة</h1>
            <p style="color: #7f8c8d; font-size: 0.95rem;">شركة ود العقارية</p>
        </div>

        <!-- قسم الفيديو -->
        <div class="section-box">
            <div class="section-title"><i class="fa-solid fa-circle-play"></i> فيديو المعاينة الحية</div>
            <div class="video-box">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
            </div>
        </div>

        <!-- قسم الصور -->
        <div class="section-box">
            <div class="section-title"><i class="fa-solid fa-images"></i> معرض الصور الفوتوغرافية</div>
            <div class="gallery-main">
                <img id="mainImage" src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=900&q=80" alt="المعروض الرئيسي">
            </div>
            <div class="thumbnails-grid">
                <img class="thumb active" src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=500&q=80" onclick="changeImage(this)">
                <img class="thumb" src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?auto=format&fit=crop&w=500&q=80" onclick="changeImage(this)">
                <img class="thumb" src="https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=500&q=80" onclick="changeImage(this)">
                <img class="thumb" src="https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=500&q=80" onclick="changeImage(this)">
            </div>
        </div>

        <!-- قسم الخريطة -->
        <div class="section-box">
            <div class="section-title"><i class="fa-solid fa-map-location-dot"></i> الموقع على خرائط جوجل</div>
            <div class="map-box">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3451.1345!2d31.2357!3d30.0444!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzDCsDAyJzQwLjAiTiAzMcKwMTQnMDguNSJF!5e0!3m2!1sar!2s!4v1625000000000!5m2!1sar!2s" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>

    </div>

    <footer>
        <p>جميع الحقوق محفوظة © شركة ود العقارية 2026</p>
    </footer>

    <script>
        function changeImage(element) {
            document.getElementById('mainImage').src = element.src;
            let thumbs = document.getElementsByClassName('thumb');
            for(let i=0; i<thumbs.length; i++) {
                thumbs[i].classList.remove('active');
            }
            element.classList.add('active');
        }
    </script>
</body>
</html>
